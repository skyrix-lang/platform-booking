services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "${BACKEND_PORT}:3001"
    environment:
      - PORT=3001
      - HOST=${HOST}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DB_PATH=${DB_PATH}
    volumes:
      - backend-data:/app/data

volumes:
  backend-data:
